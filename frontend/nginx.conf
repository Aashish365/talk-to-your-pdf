server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # .mjs files must be served as JavaScript so browsers accept them as workers
    location ~* \.mjs$ {
        types { }
        default_type application/javascript;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
